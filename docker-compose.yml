version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.dev}
    image: capstone-gin-api
    container_name: capstone-gin-api
    ports:
      - ${API_PORT}:8080
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_TLS: ${DB_TLS}
      DB_TLS_CA: ${DB_TLS_CA}
      API_PORT: ${API_PORT}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: ${UPLOAD_DIR}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_CONTAINER_NAME: ${AZURE_CONTAINER_NAME}
    volumes:
      - .:/app
      - ./uploads:/app/uploads
