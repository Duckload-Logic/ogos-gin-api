version: "3.8"

services:
  api:
    image: olazojohnalbert/capstone-gin-api:latest
    ports:
      - "80:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASS=${REDIS_PASS}
    depends_on:
      - redis
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: capstone-redis
    command: redis-server --requirepass "${REDIS_PASS}" --stop-writes-on-bgsave-error no
    restart: always
    networks:
      - app-network
    volumes:
      - redis-data:/data

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: capstone-gotenberg
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
