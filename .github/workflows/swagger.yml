name: Generate Swagger Docs

on:
  push:
    branches: [main, dev]
    paths:
      - "cmd/api/**"
      - "internal/features/**"

jobs:
  swagger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate internal docs
        run: >-
          swag init -g main.go
          --parseDependency --parseInternal
          --dir ./cmd/api,./internal/features/auth,./internal/features/users,./internal/features/appointments,./internal/features/slips,./internal/features/students,./internal/features/locations,./internal/features/logs,./internal/features/notifications,./internal/features/analytics,./internal/features/apikeys
          --output ./docs
          --instanceName internal

      - name: Generate external docs
        run: >-
          swag init -g main.go
          --parseDependency --parseInternal
          --dir ./cmd/api,./internal/features/students/external
          --output ./docs/external
          --instanceName external

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No swagger changes to commit"
          else
            git commit -m "docs: auto-generate swagger docs [skip ci]"
            git push
          fi
