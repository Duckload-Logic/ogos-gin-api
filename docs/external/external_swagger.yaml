basePath: /api/v1
definitions:
  external.OGOSListStudentsResponse:
    properties:
      meta:
        $ref: '#/definitions/structs.PaginationMetadata'
      students:
        items:
          $ref: '#/definitions/external.OGOSStudentDTO'
        type: array
    type: object
  external.OGOSStudentAddressDTO:
    properties:
      addressType:
        type: string
      barangay:
        $ref: '#/definitions/locations.Barangay'
      city:
        $ref: '#/definitions/locations.City'
      province:
        $ref: '#/definitions/locations.ProvinceDTO'
      region:
        $ref: '#/definitions/locations.Region'
      streetDetail:
        type: string
      studentNumber:
        type: string
    type: object
  external.OGOSStudentDTO:
    properties:
      course:
        $ref: '#/definitions/students.Course'
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      middleName:
        $ref: '#/definitions/structs.NullableString'
      mobileNumber:
        type: string
      section:
        type: string
      studentNumber:
        type: string
      suffixName:
        type: string
      userId:
        type: string
      yearLevel:
        type: integer
    type: object
  external.OGOSStudentPersonalInfoDTO:
    properties:
      dateOfBirth:
        type: string
      gender:
        $ref: '#/definitions/students.Gender'
      heightFt:
        type: number
      placeOfBirth:
        type: string
      studentNumber:
        type: string
      weightKg:
        type: number
    type: object
  locations.Barangay:
    properties:
      cityId:
        type: integer
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  locations.City:
    properties:
      code:
        type: string
      district:
        type: string
      id:
        type: integer
      name:
        type: string
      provinceCode:
        type: string
      regionCode:
        type: string
      type:
        type: string
      zipCode:
        type: string
    type: object
  locations.ProvinceDTO:
    properties:
      code:
        $ref: '#/definitions/structs.NullableString'
      id:
        type: integer
      name:
        $ref: '#/definitions/structs.NullableString'
      regionCode:
        $ref: '#/definitions/structs.NullableString'
    type: object
  locations.Region:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  structs.NullableString:
    properties:
      string:
        type: string
      valid:
        description: Valid is true if String is not NULL
        type: boolean
    type: object
  structs.PaginationMetadata:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  students.Course:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  students.Gender:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
info:
  contact: {}
  title: Student data API
  version: "2.0"
paths:
  /students/external:
    get:
      consumes:
      - application/json
      description: Get a paginated list of students with optional filters
      parameters:
      - description: Search term for student name or number
        in: query
        name: search
        type: string
      - description: Filter by course ID
        in: query
        name: course_id
        type: integer
      - description: Filter by gender ID
        in: query
        name: gender_id
        type: integer
      - description: Filter by year level
        in: query
        name: year_level
        type: integer
      - description: Order by field (first_name, last_name, student_number, created_at,
          updated_at, year_level, course_id)
        in: query
        name: order_by
        type: string
      - description: Page number for pagination
        in: query
        name: page
        type: integer
      - description: Number of items per page for pagination
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/external.OGOSListStudentsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: List students
      tags:
      - External Students
  /students/external/addresses/{studentNumber}:
    get:
      consumes:
      - application/json
      description: Get all addresses of a student by their student number
      parameters:
      - description: Student number of the student
        in: path
        name: studentNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/external.OGOSStudentAddressDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get student addresses by student number
      tags:
      - External Students
  /students/external/by-id/{userID}:
    get:
      consumes:
      - application/json
      description: Get student information by user ID
      parameters:
      - description: User ID of the student
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/external.OGOSStudentDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get student by user ID
      tags:
      - External Students
  /students/external/personal-info/{studentNumber}:
    get:
      consumes:
      - application/json
      description: Get personal information of a student by their student number
      parameters:
      - description: Student number of the student
        in: path
        name: studentNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/external.OGOSStudentPersonalInfoDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get personal information by student number
      tags:
      - External Students
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
