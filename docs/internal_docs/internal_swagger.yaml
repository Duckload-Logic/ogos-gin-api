basePath: /api/v1
definitions:
  appointments.Appointment:
    properties:
      adminNotes:
        $ref: '#/definitions/sql.NullString'
      appointmentCategoryId:
        type: integer
      createdAt:
        type: string
      id:
        type: string
      iirId:
        type: string
      reason:
        $ref: '#/definitions/sql.NullString'
      scheduledTime:
        type: integer
      statusId:
        type: integer
      updatedAt:
        type: string
      whenDate:
        type: string
    type: object
  appointments.AppointmentCategory:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  appointments.AppointmentDTO:
    properties:
      adminNotes:
        $ref: '#/definitions/structs.NullableString'
      appointmentCategory:
        $ref: '#/definitions/appointments.AppointmentCategory'
      createdAt:
        type: string
      hasSignificantNote:
        type: boolean
      id:
        type: string
      iirId:
        type: string
      reason:
        $ref: '#/definitions/structs.NullableString'
      status:
        $ref: '#/definitions/appointments.AppointmentStatus'
      studentNumber:
        type: string
      timeSlot:
        $ref: '#/definitions/appointments.TimeSlot'
      updatedAt:
        type: string
      user:
        $ref: '#/definitions/users.GetUserResponse'
      whenDate:
        type: string
    type: object
  appointments.AppointmentStatus:
    properties:
      colorKey:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  appointments.AvailableTimeSlotView:
    properties:
      id:
        type: integer
      isAvailable:
        type: boolean
      time:
        type: string
    type: object
  appointments.DailyStatusCount:
    properties:
      date:
        type: string
      pendingCount:
        type: integer
      rescheduledCount:
        type: integer
      scheduledCount:
        type: integer
    type: object
  appointments.StatusCount:
    properties:
      count:
        type: integer
      id:
        type: integer
      name:
        type: string
    type: object
  appointments.TimeSlot:
    properties:
      id:
        type: integer
      time:
        type: string
    type: object
  auth.LoginDTO:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.MeResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      lastName:
        type: string
      middleName:
        type: string
      role:
        $ref: '#/definitions/users.Role'
      type:
        description: '"native" or "idp"'
        type: string
    type: object
  auth.RegisterDTO:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      middleName:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
  idp.IDPTokenExchangeRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      code:
        type: string
    type: object
  integrations.ListStudentsSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/integrations.OGOSListStudentsResponse'
      status:
        allOf:
        - $ref: '#/definitions/response.JSendStatus'
        example: success
    type: object
  integrations.OGOSListStudentsResponse:
    properties:
      meta:
        $ref: '#/definitions/structs.PaginationMetadata'
      students:
        items:
          $ref: '#/definitions/integrations.OGOSStudentDTO'
        type: array
    type: object
  integrations.OGOSStudentAddressDTO:
    properties:
      addressType:
        type: string
      barangay:
        $ref: '#/definitions/locations.Barangay'
      city:
        $ref: '#/definitions/locations.City'
      province:
        $ref: '#/definitions/locations.ProvinceDTO'
      region:
        $ref: '#/definitions/locations.Region'
      streetDetail:
        type: string
      studentNumber:
        type: string
    type: object
  integrations.OGOSStudentDTO:
    properties:
      course:
        $ref: '#/definitions/students.Course'
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      middleName:
        $ref: '#/definitions/structs.NullableString'
      mobileNumber:
        type: string
      section:
        type: string
      studentNumber:
        type: string
      suffixName:
        type: string
      yearLevel:
        type: integer
    type: object
  integrations.OGOSStudentPersonalInfoDTO:
    properties:
      dateOfBirth:
        type: string
      gender:
        $ref: '#/definitions/students.Gender'
      heightFt:
        type: number
      placeOfBirth:
        type: string
      studentNumber:
        type: string
      weightKg:
        type: number
    type: object
  integrations.StudentAddressSuccessResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/integrations.OGOSStudentAddressDTO'
        type: array
      status:
        allOf:
        - $ref: '#/definitions/response.JSendStatus'
        example: success
    type: object
  integrations.StudentPersonalInfoSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/integrations.OGOSStudentPersonalInfoDTO'
      status:
        allOf:
        - $ref: '#/definitions/response.JSendStatus'
        example: success
    type: object
  integrations.StudentSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/integrations.OGOSStudentDTO'
      status:
        example: success
        type: string
    type: object
  locations.Barangay:
    properties:
      cityId:
        type: integer
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  locations.City:
    properties:
      code:
        type: string
      district:
        type: string
      id:
        type: integer
      name:
        type: string
      provinceCode:
        type: string
      regionCode:
        type: string
      type:
        type: string
      zipCode:
        type: string
    type: object
  locations.ProvinceDTO:
    properties:
      code:
        $ref: '#/definitions/structs.NullableString'
      id:
        type: integer
      name:
        $ref: '#/definitions/structs.NullableString'
      regionCode:
        $ref: '#/definitions/structs.NullableString'
    type: object
  locations.Region:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  response.CommonErrorResponse:
    properties:
      code:
        example: 400
        type: integer
      data: {}
      message:
        example: Detailed error message
        type: string
      status:
        example: fail
        type: string
    type: object
  response.JSendStatus:
    enum:
    - success
    - fail
    - error
    type: string
    x-enum-varnames:
    - StatusSuccess
    - StatusFail
    - StatusError
  slips.AttachmentDTO:
    properties:
      fileName:
        type: string
      fileUrl:
        type: string
      id:
        type: string
    type: object
  slips.SlipCategory:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  slips.SlipDTO:
    properties:
      adminNotes:
        $ref: '#/definitions/structs.NullableString'
      category:
        $ref: '#/definitions/slips.SlipCategory'
      createdAt:
        type: string
      dateNeeded:
        type: string
      dateOfAbsence:
        type: string
      id:
        type: string
      iirId:
        type: string
      reason:
        type: string
      status:
        $ref: '#/definitions/slips.SlipStatus'
      studentNumber:
        type: string
      updatedAt:
        type: string
      user:
        $ref: '#/definitions/users.GetUserResponse'
    required:
    - category
    - dateNeeded
    - dateOfAbsence
    - reason
    type: object
  slips.SlipStatus:
    properties:
      colorKey:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  slips.SlipStatusCount:
    properties:
      colorKey:
        type: string
      count:
        type: integer
      id:
        type: integer
      name:
        type: string
    type: object
  slips.UpdateStatusRequest:
    properties:
      adminNotes:
        type: string
      status:
        type: string
    required:
    - status
    type: object
  sql.NullString:
    properties:
      string:
        type: string
      valid:
        description: Valid is true if String is not NULL
        type: boolean
    type: object
  structs.NullableString:
    properties:
      string:
        type: string
      valid:
        description: Valid is true if String is not NULL
        type: boolean
    type: object
  structs.PaginationMetadata:
    properties:
      page:
        type: integer
      pagesSize:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  students.Course:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  students.Gender:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  students.ListStudentsResponse:
    properties:
      meta:
        $ref: '#/definitions/structs.PaginationMetadata'
      students:
        items:
          $ref: '#/definitions/students.StudentProfileDTO'
        type: array
    type: object
  students.StudentProfileDTO:
    properties:
      course:
        $ref: '#/definitions/students.Course'
      email:
        type: string
      firstName:
        type: string
      gender:
        $ref: '#/definitions/students.Gender'
      iirId:
        type: string
      lastName:
        type: string
      middleName:
        $ref: '#/definitions/structs.NullableString'
      section:
        type: integer
      studentNumber:
        type: string
      suffixName:
        $ref: '#/definitions/structs.NullableString'
      userId:
        type: string
      yearLevel:
        type: integer
    type: object
  users.GetUserResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      lastName:
        type: string
      middleName:
        $ref: '#/definitions/structs.NullableString'
      role:
        $ref: '#/definitions/users.Role'
      updatedAt:
        type: string
    type: object
  users.Role:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
info:
  contact: {}
  title: Student data API
  version: "2.0"
paths:
  /appointments:
    get:
      consumes:
      - application/json
      description: Retrieves a list of all appointments.
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by start date
        in: query
        name: start_date
        type: string
      - description: Filter by end date
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all appointments
      tags:
      - Appointments
    post:
      consumes:
      - application/json
      description: Schedules a new appointment for a student.
      parameters:
      - description: Appointment Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/appointments.AppointmentDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Book a new appointment
      tags:
      - Appointments
  /appointments/calendar/stats:
    get:
      description: Retrieves appointment status counts by date.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/appointments.DailyStatusCount'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get daily status count
      tags:
      - Appointments
  /appointments/id/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves the details of a specific appointment.
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appointments.Appointment'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get appointment details
      tags:
      - Appointments
    patch:
      consumes:
      - application/json
      description: Updates appointment details (reschedule).
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated appointment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/appointments.AppointmentDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update appointment
      tags:
      - Appointments
  /appointments/lookups/categories:
    get:
      description: Retrieves available appointment categories.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/appointments.AppointmentCategory'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get appointment categories
      tags:
      - Appointments
  /appointments/lookups/slots:
    get:
      description: Retrieves available time slots for a date.
      parameters:
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/appointments.AvailableTimeSlotView'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get available time slots
      tags:
      - Appointments
  /appointments/lookups/statuses:
    get:
      description: Retrieves available appointment statuses.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/appointments.AppointmentStatus'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get appointment statuses
      tags:
      - Appointments
  /appointments/me:
    get:
      description: Retrieves appointments for the authenticated student.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get student's appointments
      tags:
      - Appointments
  /appointments/stats:
    get:
      description: Retrieves appointment status counts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/appointments.StatusCount'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get appointment statistics
      tags:
      - Appointments
  /auth/idp/authorize:
    get:
      description: Redirects to OAuth 2.0 authorization page on the IDP.
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to IDP login page
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get IDP authorization URL
      tags:
      - Auth
  /auth/idp/session:
    get:
      description: Validates the current IDP session using the idp_session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Validate IDP session
      tags:
      - Auth
  /auth/idp/token:
    post:
      consumes:
      - application/json
      description: Completes OAuth 2.0 flow and provisions user
      parameters:
      - description: Code & State
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/idp.IDPTokenExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Exchange IDP authorization code for tokens
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and sets JWT cookies.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Returns user info
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidates the user's tokens by clearing cookies.
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User logout
      tags:
      - Auth
  /auth/me:
    get:
      description: Retrieves information about the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MeResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current user info
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes the JWT token using the refresh token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: New access token (optional)
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh JWT token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new developer account.
      parameters:
      - description: Registration Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User registration
      tags:
      - Auth
  /integrations/students/{studentNumber}:
    get:
      consumes:
      - application/json
      description: Get student information by student number
      parameters:
      - description: Student number of the student
        in: path
        name: studentNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/integrations.StudentSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get student by student number
      tags:
      - External Students
  /integrations/students/{studentNumber}/addresses:
    get:
      consumes:
      - application/json
      description: Get all addresses of a student by their student number
      parameters:
      - description: Student number of the student
        in: path
        name: studentNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/integrations.StudentAddressSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get student addresses by student number
      tags:
      - External Students
  /integrations/students/{studentNumber}/personal-info:
    get:
      consumes:
      - application/json
      description: Get personal information of a student by their student number
      parameters:
      - description: Student number of the student
        in: path
        name: studentNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/integrations.StudentPersonalInfoSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get personal information by student number
      tags:
      - External Students
  /integrations/students/profiles:
    get:
      consumes:
      - application/json
      description: Get a paginated list of students with optional filters
      parameters:
      - description: Search term for student name or number
        in: query
        name: search
        type: string
      - description: Filter by course ID
        in: query
        name: course_id
        type: integer
      - description: Filter by gender ID
        in: query
        name: gender_id
        type: integer
      - description: Filter by year level
        in: query
        name: year_level
        type: integer
      - description: Order by field (first_name, last_name, student_number, created_at,
          updated_at, year_level, course_id)
        in: query
        name: order_by
        type: string
      - description: Page number for pagination
        in: query
        name: page
        type: integer
      - description: Number of items per page for pagination
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/integrations.ListStudentsSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.CommonErrorResponse'
      security:
      - ApiKeyAuth: []
