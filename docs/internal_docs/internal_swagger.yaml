      tags:
      - External Students
  /slips:
    get:
      description: Retrieves list of all submitted slips.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all excuse slips
      tags:
      - ExcuseSlips
    post:
      consumes:
      - multipart/form-data
      description: |-
        Allows a student to submit an excuse slip with
        supporting document (file upload).
      parameters:
      - description: Reason for absence
        in: formData
        name: reason
        required: true
        type: string
      - description: Date (YYYY-MM-DD)
        in: formData
        name: absenceDate
        required: true
        type: string
      - description: Supporting Document
        in: formData
        name: files
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit an excuse slip
      tags:
      - ExcuseSlips
  /slips/id/{id}:
    get:
      description: Retrieves details for a specific excuse slip.
      parameters:
      - description: Slip ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/slips.SlipDTO'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get excuse slip by ID
      tags:
      - ExcuseSlips
  /slips/id/{id}/attachments:
    get:
      description: Retrieves attachments for a specific slip.
      parameters:
      - description: Slip ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/slips.AttachmentDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get slip attachments
      tags:
      - ExcuseSlips
  /slips/id/{id}/attachments/{attachmentId}:
    get:
      description: Downloads a specific attachment file.
      parameters:
      - description: Attachment ID
        in: path
        name: attachmentId
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download attachment
      tags:
      - ExcuseSlips
  /slips/id/{id}/status:
    patch:
      consumes:
      - application/json
      description: Approve, reject, or request revision of slip.
      parameters:
      - description: Slip ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status and notes
        in: body
